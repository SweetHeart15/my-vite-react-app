services:
  - type: web
    name: sanctuary-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        value: https://fintrack-flame-nine.vercel.app