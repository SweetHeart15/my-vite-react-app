services:
  - type: web
    name: sanctuary-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # fill this in Render's dashboard
      - key: CLIENT_ORIGIN
        sync: false          # your Vercel frontend URL